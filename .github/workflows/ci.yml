name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      # Materialize the pinned Rust toolchain and its components once before
      # rust:ci runs its tasks in parallel. A fresh runner otherwise lets the
      # concurrent cargo invocations race installing the toolchain, and rustup's
      # on-demand install uses the minimal profile without rustfmt/clippy.
      - name: Warm up the Rust toolchain
        run: |
          mise exec -- cargo --version
          mise exec -- rustup component add rustfmt clippy
      - run: mise run rust:ci
