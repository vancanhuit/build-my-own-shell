name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      # Materialize the Rust toolchain once before rust:ci runs its tasks in
      # parallel, otherwise concurrent cargo invocations race installing the
      # rustup components and fail with a "could not rename" download error.
      - run: mise exec -- cargo --version
      - run: mise run rust:ci
