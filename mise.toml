[tools]
rust = { version = "1.96.0", components = [
  "rustfmt",
  "clippy",
  "rust-analyzer",
] }
python = "3.14.6"
cocogitto = "7.0.0"
gh = "2.95.0"

[env]
RUST_BACKTRACE = "1"

[tasks."rust:fmt"]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks."rust:fmt:check"]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks."rust:lint"]
description = "Lint Rust code with clippy"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks."rust:build"]
description = "Build the shell"
run = "cargo build --all-targets"

[tasks."rust:test"]
description = "Run the test suite"
run = "cargo test --all-features"

[tasks."rust:ci"]
description = "Run the full local CI suite"
depends = ["rust:fmt:check", "rust:lint", "rust:build", "rust:test"]

[tasks."dev:shell"]
description = "Run the shell interactively"
run = "cargo run --quiet"

[tasks."git:hooks:install"]
description = "Install Cocogitto git hooks"
run = "cog install-hook --all --overwrite"

[tasks."pr:title:validate"]
description = "Validate a pull request title as a Conventional Commit"
run = 'echo "$PR_TITLE" | cog verify --file -'
